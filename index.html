<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ_Q Info</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем шрифт Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="glass-container">
        <!-- Добавленная аватарка -->
        <div class="avatar">
            <img src="https://imgur.com/a/PAAfr3v" alt="Avatar">
        </div>

        <h1 class="title">faq_q info</h1>
        <p class="subtitle">info</p>
        
        <div class="grid">
            <div class="glass-card">
                <h3 class="card-title">channel</h3>
                <p class="card-text">no shit post only info</p>
                <a href="https://t.me/mlvuv" target="_blank" class="glass-btn">mlvuv</a>
            </div>
            
            <div class="glass-card">
                <h3 class="card-title">chat</h3>
                <p class="card-text">for communication</p>
                <a href="https://t.me/faqqchat" target="_blank" class="glass-btn">faqqchat</a>
            </div>
            
            <div class="glass-card">
                <h3 class="card-title">p.m</h3>
                <p class="card-text">not spam pls</p>
                <a href="https://t.me/faq_q" target="_blank" class="glass-btn">faq_q</a>
            </div>
        </div>
    </div>

</body>
</html>
